name: Build and Deploy

on:
  push:
    branches:
      - main
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: actions/setup-node@v4 #this installs node and npm for us
        with:
          node-version: "22.x"
          cache: "npm"
      - name: Build
        run: |
          npm install
          npm run build --prod --base-href "https://vertebrae-ent.github.io/"
      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: gh-pages
          folder: dist/vertebrae/browser
